name: puresip_payrolls
description: "A comprehensive payroll and employee management system."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================================================
  # ✅ UI & Helpers
  # ============================================================
  cupertino_icons: ^1.0.8

  # ============================================================
  # ✅ Local Database (SQLite)
  # ============================================================
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  path: ^1.9.0
  path_provider: ^2.1.0

  # ============================================================
  # ✅ Device Info - إصدار متوافق
  # ============================================================
  device_info_plus: ^9.1.0

  # ============================================================
  # ✅ Firebase - إصدارات متوافقة مع web
  # ============================================================
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  firebase_remote_config: ^4.3.0
  firebase_messaging: ^14.6.0
  firebase_performance: ^0.9.3+3

  # ============================================================
  # ✅ Navigation & State Management
  # ============================================================
  go_router: ^13.0.0
  provider: ^6.1.5

  # ============================================================
  # ✅ Storage
  # ============================================================
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.0.0

  # ============================================================
  # ✅ Localization
  # ============================================================
  easy_localization: ^3.0.7+1

  # ============================================================
  # ✅ Utilities
  # ============================================================
  uuid: ^4.5.1
  cryptography: ^2.9.0
  intl: ^0.20.2
  connectivity_plus: ^5.0.1
  package_info_plus: ^4.2.0
  url_launcher: ^6.2.5
  open_file: ^4.0.0
  http: ^1.1.0

  # ============================================================
  # ✅ Excel Export/Import - إصدار متوافق
  # ============================================================
  excel: ^4.0.6
  file_picker: ^8.0.7

  # ============================================================
  # ✅ Web Support
  # ============================================================
  universal_html: ^2.2.4

  # ============================================================
  # ✅ Crypto
  # ============================================================
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  build_runner: ^2.4.0

# ✅ حل مشكلة التوافق مع web
dependency_overrides:
  web: ^0.5.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/translations/
    - assets/translations/en.json
    - assets/translations/ar.json