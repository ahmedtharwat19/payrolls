name: puresip_payrolls
description: "A comprehensive payroll and employee management system."
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ============================================================
  # ✅ UI & Helpers
  # ============================================================
  cupertino_icons: ^1.0.8

  # ============================================================
  # ✅ Local Database (SQLite) - إصدارات متوافقة
  # ============================================================
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.0
  sqflite_common_ffi_web: ^1.1.2
  sqlite3: ^3.1.2
  path: ^1.9.0
  path_provider: ^2.1.0

  # ============================================================
  # ✅ Device Info
  # ============================================================
  device_info_plus: ^11.1.0 # ⬅️ خفض الإصدار لتوافق win32

  # ============================================================
  # ✅ Firebase - إصدارات متوافقة مع بعضها
  # ============================================================
  firebase_core: ^3.12.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  firebase_remote_config: ^5.4.0
  firebase_messaging: ^15.2.0
  firebase_performance: ^0.10.0

  # ============================================================
  # ✅ Navigation & State Management
  # ============================================================
  go_router: ^14.8.0
  provider: ^6.1.5

  # ============================================================
  # ✅ Storage
  # ============================================================
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.0.0

  # ============================================================
  # ✅ Localization
  # ============================================================
  easy_localization: ^3.0.7+1

  # ============================================================
  # ✅ Utilities - استخدام crypto فقط
  # ============================================================
  uuid: ^4.5.1
  crypto: ^3.0.6 # ✅ استخدم crypto فقط
  # cryptography: ^2.9.0  # ❌ احذف هذا السطر
  intl: ^0.20.2
  connectivity_plus: ^6.1.0
  package_info_plus: ^8.3.0
  url_launcher: ^6.3.1
  open_file: ^4.0.0
  http: ^1.3.0

  # ============================================================
  # ✅ Excel Export/Import
  # ============================================================
  excel: ^4.0.6
  file_picker: ^11.0.0 # ⬅️ خفض الإصدار للتوافق

  # ============================================================
  # ✅ Web Support
  # ============================================================
  universal_html: ^2.2.4
  web: ^1.1.1
  cryptography: ^2.9.0
  printing: ^5.14.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4
  build_runner: ^2.4.0

# ✅ إزالة dependency_overrides - الأفضل تجنبها
# dependency_overrides:
#   sqlite3: ^3.1.2
#   win32: ^6.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png
    - assets/lang/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Light.ttf
          weight: 300
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
    - family: Roboto
      fonts:
        - asset: assets/fonts/Roboto-Regular.ttf
        - asset: assets/fonts/Roboto-Bold.ttf
    - family: NotoSans
      fonts:
        - asset: assets/fonts/NotoSans-Regular.ttf
